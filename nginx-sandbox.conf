map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;

    # Matches /<port>/<path>
    location ~ ^/(\d+)(?:/(.*))? {
        set $sandbox_port $1;
        set $sandbox_path $2;

        # Route traffic out of the Nginx container to the host where the sandbox lives
        proxy_pass http://host.docker.internal:$sandbox_port/$sandbox_path$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
