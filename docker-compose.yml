services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    expose:
      - "4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      # Provider API keys — only set the ones you use
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STORE_MODEL_IN_DB: "true"
      # SERVER_ROOT_PATH: "/"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      - default
      - db_network
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db_network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "4001:4001"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_HOST: ${CADDY_HOST}
      CADDY_USER: ${CADDY_USER}
      CADDY_PASSWORD_HASH: ${CADDY_PASSWORD_HASH}
    depends_on:
      - openhands
    restart: unless-stopped
    networks:
      default:
        aliases:
          - alivibe.tgimaginarium.shop

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    pull_policy: always
    container_name: openhands-app
    # port 3000 no longer exposed directly — access via Caddy only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    environment:
      WEB_HOST: "https://alivibe.tgimaginarium.shop"
      SANDBOX_CONTAINER_URL_PATTERN: "https://alivibe.tgimaginarium.shop/sandbox/{port}"
      OH_PERMITTED_CORS_ORIGINS: '["https://alivibe.tgimaginarium.shop"]'
      AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      AGENT_SERVER_IMAGE_TAG: 1.15.0-python
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: ${LLM_MODEL}            # must match a model_name in litellm_config.yaml
      LLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-1234} # Authenticate with LiteLLM proxy
      LLM_BASE_URL: http://litellm:4000  # route all LLM calls through LiteLLM
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm
    restart: unless-stopped

  nginx-sandbox:
    image: nginx:alpine
    container_name: nginx-sandbox
    volumes:
      - ./nginx-sandbox.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  postgres-data:

networks:
  db_network:
    internal: true
