services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      # Provider API keys — only set the ones you use
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_HOST: ${CADDY_HOST}
      CADDY_USER: ${CADDY_USER}
      CADDY_PASSWORD_HASH: ${CADDY_PASSWORD_HASH}
    depends_on:
      - openhands
    restart: unless-stopped

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    pull_policy: always
    container_name: openhands-app
    # port 3000 no longer exposed directly — access via Caddy only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    environment:
      WEB_HOST: "https://vibephone.tgimaginarium.shop"
      SANDBOX_CONTAINER_URL_PATTERN: "https://vibephone.tgimaginarium.shop:{port}"
      OH_ALLOW_CORS_ORIGINS_0: "https://vibephone.tgimaginarium.shop"
      AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      AGENT_SERVER_IMAGE_TAG: 1.15.0-python
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: ${LLM_MODEL}            # must match a model_name in litellm_config.yaml
      LLM_API_KEY: "dummy"               # LiteLLM has no auth; any non-empty value works
      LLM_BASE_URL: http://litellm:4000  # route all LLM calls through LiteLLM
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm
    restart: unless-stopped

  webhook:
    build: .
    container_name: openhands-webhook
    ports:
      - "8080:8080"
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENHANDS_BASE_URL: http://openhands:3000
    depends_on:
      - openhands
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
