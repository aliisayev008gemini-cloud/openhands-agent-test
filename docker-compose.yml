services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:0.39
    container_name: openhands
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands-state
      - ./workspace:/workspace
      - ./config.toml:/app/config.toml:ro
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.all-hands.dev/all-hands-ai/runtime:0.39-nikolaik
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  webhook:
    build: .
    container_name: openhands-webhook
    ports:
      - "8080:8080"
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENHANDS_BASE_URL: http://openhands:3000
    depends_on:
      - openhands
    restart: unless-stopped

volumes:
  openhands-state:
